<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Capture — Send a thought to yourself</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #1C1C1A;
      background: #FAFAF8;
      line-height: 1.7;
      padding: 48px 24px;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container { max-width: 480px; text-align: center; }
    h1 {
      font-weight: 200;
      letter-spacing: 8px;
      font-size: 36px;
      margin-bottom: 24px;
    }
    .tagline {
      font-size: 18px;
      font-weight: 300;
      color: #3a3a38;
      margin-bottom: 16px;
    }
    .description {
      font-size: 15px;
      color: #AEAEA6;
      margin-bottom: 48px;
    }
    .links {
      display: flex;
      gap: 24px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .links a {
      color: #AEAEA6;
      font-size: 14px;
      text-decoration: none;
      letter-spacing: 0.3px;
    }
    .links a:hover { color: #1C1C1A; }
  </style>
</head>
<body>
  <div class="container">
    <h1>capture</h1>
    <p class="tagline">Send a thought to yourself.</p>
    <p class="description">
      Tap. Type. It's in your inbox.<br>
      A minimal app for capturing thoughts before they disappear.
    </p>
    <div class="links">
      <a href="https://captureapp.dev/privacy">Privacy Policy</a>
      <a href="mailto:andrey.boar@gmail.com">Contact</a>
    </div>
  </div>
</body>
</html>
